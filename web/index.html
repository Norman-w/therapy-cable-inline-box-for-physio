<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>therapy-cable-inline-box-for-physio — 3D 预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; height: 100vh; }
  #canvas-container { width: 100vw; height: 100vh; }
  .info-panel { position: fixed; top: 16px; left: 16px; background: rgba(22,22,44,0.92); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 20px; color: #e0e0e0; z-index: 10; font-size: 13px; line-height: 1.6; pointer-events: none; }
  .info-panel h1 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .info-panel .subtitle { color: #8899aa; font-size: 11px; }
  .info-panel .stats { margin-top: 10px; font-family: monospace; font-size: 11px; color: #99aabb; }
  .info-panel .stats span { color: #ffd166; }
  .switcher { margin-top: 10px; display: flex; gap: 6px; }
  .switcher button { pointer-events: auto; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); color: #aabbcc; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .switcher button:hover { background: rgba(255,255,255,0.16); color: #fff; }
  .switcher button.active { background: rgba(255,209,102,0.15); border-color: #ffd166; color: #ffd166; }
  .dl-panel { position: fixed; top: 16px; right: 16px; background: rgba(22,22,44,0.92); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 20px; color: #e0e0e0; z-index: 10; font-size: 12px; min-width: 170px; }
  .dl-panel h2 { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 10px; }
  .dl-panel a { text-decoration: none; display: block; margin-bottom: 6px; }
  .dl-panel a button { width: 100%; padding: 8px 12px; font-size: 12px; cursor: pointer; background: rgba(100,180,255,0.12); border: 1px solid rgba(100,180,255,0.2); color: #aaccff; border-radius: 6px; transition: all 0.2s; }
  .dl-panel a button:hover { background: rgba(100,180,255,0.25); color: #fff; }
  .dl-panel a.flat button { background: rgba(255,180,100,0.12); border-color: rgba(255,180,100,0.2); color: #ffcc88; }
  .dl-panel a.flat button:hover { background: rgba(255,180,100,0.25); color: #fff; }
  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(22,22,44,0.85); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 8px 20px; color: #667788; font-size: 11px; z-index: 10; }
  .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #8899aa; font-size: 14px; z-index: 100; }
  .loading.hidden { display: none; }
</style>
</head>
<body>
<div class="info-panel">
  <h1>🧊 therapy-cable-inline-box-for-physio</h1>
  <div class="subtitle">理疗仪线缆串联电阻保护盒</div>
  <div class="stats">Model: <span id="model-name">—</span><br>Triangles: <span id="tri-count">—</span><br>Size: <span id="bbox-size">—</span></div>
  <div class="switcher">
    <button id="btn-bottom" onclick="switchModel('bottom')">🔽 下半</button>
    <button id="btn-top" onclick="switchModel('top')">🔼 上半</button>
    <button id="btn-merged" onclick="switchModel('merged')">🔗 合并</button>
  </div>
</div>
<div class="dl-panel">
  <h2>📥 下载 STL</h2>
  <a id="dl-bottom" href="#"><button>🔽 下半壳体</button></a>
  <a id="dl-top" href="#"><button>🔼 上半壳体</button></a>
  <a id="dl-flat" class="flat" href="#"><button>📦 合并打印（双件平放）</button></a>
</div>
<div class="hint" id="hint">🖱 左键旋转 | 滚轮缩放 | 右键平移</div>
<div class="loading" id="loading">加载模型中...</div>
<div id="canvas-container"></div>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';

const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 60, 200);
const camera = new THREE.PerspectiveCamera(45, container.clientWidth/container.clientHeight, 0.5, 500);
camera.position.set(40, 30, 50); camera.lookAt(0,0,0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0x8899bb, 3.5); scene.add(ambient);
const keyLight = new THREE.DirectionalLight(0xffeedd, 5); keyLight.position.set(20,40,30);
keyLight.castShadow = true; keyLight.shadow.mapSize.width = 2048; keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5; keyLight.shadow.camera.far = 200;
keyLight.shadow.camera.left = -50; keyLight.shadow.camera.right = 50;
keyLight.shadow.camera.top = 50; keyLight.shadow.camera.bottom = -50;
keyLight.shadow.bias = -0.0001; scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0xaaccff, 3); fillLight.position.set(-15,15,-10); scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 3); rimLight.position.set(0,-5,-30); scene.add(rimLight);
const bottomLight = new THREE.DirectionalLight(0x8899cc, 2.5); bottomLight.position.set(0,-20,0); scene.add(bottomLight);
const gridHelper = new THREE.GridHelper(80, 20, 0x334455, 0x222244); gridHelper.position.y = -20; scene.add(gridHelper);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.08;
controls.minDistance = 5; controls.maxDistance = 150; controls.target.set(0,0,0); controls.update();

const STL_BASE = (() => { const p = window.location.pathname; return p.replace(/\/(web\/)?(index\.html)?$/,'').replace(/\/+$/,''); })();
const TS = '?v=' + Date.now();
const URLS = { bottom: STL_BASE+'/stl/bottom-half.stl'+TS, top: STL_BASE+'/stl/top-half.stl'+TS, flat: STL_BASE+'/stl/flat-both.stl'+TS };
document.getElementById('dl-bottom').href = URLS.bottom;
document.getElementById('dl-top').href = URLS.top;
document.getElementById('dl-flat').href = URLS.flat;

let models = [];
const loader = new STLLoader();
const MAT_B = new THREE.MeshPhysicalMaterial({ color: 0xeeddcc, metalness: 0.05, roughness: 0.45, clearcoat: 0.1, clearcoatRoughness: 0.2 });
const MAT_T = new THREE.MeshPhysicalMaterial({ color: 0x88bbdd, metalness: 0.05, roughness: 0.45, clearcoat: 0.1, clearcoatRoughness: 0.2, transparent: true, opacity: 0.85 });

function clearModels() { models.forEach(m => scene.remove(m)); models = []; }
function addModel(geo, mat, pos) {
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat); mesh.castShadow = true; mesh.receiveShadow = true;
  mesh.position.copy(pos);
  const wf = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color:0x334466, wireframe:true, transparent:true, opacity:0.06 }));
  mesh.add(wf); scene.add(mesh); models.push(mesh); return mesh;
}
function fitCamera() {
  const box = new THREE.Box3(); models.forEach(m => box.expandByObject(m));
  const s = box.getSize(new THREE.Vector3()); const c = box.getCenter(new THREE.Vector3());
  const d = Math.max(s.x,s.y,s.z);
  camera.position.copy(c.clone().add(new THREE.Vector3(d*1.4, d*1.0, d*1.6)));
  controls.target.copy(c); controls.update();
  document.getElementById('bbox-size').textContent = `${s.x.toFixed(1)} × ${s.y.toFixed(1)} × ${s.z.toFixed(1)} mm`;
}

const lel = document.getElementById('loading');
function loadOne(url, mat, pos, label, cb) {
  lel.classList.remove('hidden'); lel.textContent = '加载中...';
  loader.load(url, (geo) => {
    addModel(geo, mat, pos);
    document.getElementById('tri-count').textContent = (geo.index?geo.index.count/3:geo.attributes.position.count/3).toLocaleString();
    document.getElementById('model-name').textContent = label;
    if (cb) cb(geo);
    lel.classList.add('hidden');
  }, (p) => { if (p.total>0) lel.textContent = `加载中... ${Math.round(p.loaded/p.total*100)}%`; },
  (err) => { lel.textContent = '加载失败 — '+(err?.message||err); console.error(err); });
}

const BTN_B = document.getElementById('btn-bottom'), BTN_T = document.getElementById('btn-top'), BTN_M = document.getElementById('btn-merged');
window.switchModel = function(part) {
  clearModels();
  BTN_B.classList.toggle('active', part==='bottom');
  BTN_T.classList.toggle('active', part==='top');
  BTN_M.classList.toggle('active', part==='merged');
  if (part === 'bottom') {
    loadOne(URLS.bottom, MAT_B, new THREE.Vector3(0,0,0), '下半壳体', fitCamera);
  } else if (part === 'top') {
    loadOne(URLS.top, MAT_T, new THREE.Vector3(0,0,0), '上半壳体', fitCamera);
  } else if (part === 'merged') {
    lel.classList.remove('hidden'); lel.textContent = '加载合并模型...';
    let n=0; const geos=[];
    function done() { n++; if(n===2){ fitCamera(); document.getElementById('model-name').textContent='合并装配'; lel.classList.add('hidden'); } }
    loader.load(URLS.bottom, (g)=>{ geos.push(g); addModel(g, MAT_B, new THREE.Vector3(0,0,0)); done(); }, null, done);
    loader.load(URLS.top,    (g)=>{ geos.push(g); addModel(g, MAT_T, new THREE.Vector3(0,0,0)); done(); }, null, done);
  }
};

(async function(){
  try { const r = await fetch(URLS.bottom, {method:'HEAD'}); if(r.ok){ switchModel('bottom'); return; } } catch(e){}
  lel.textContent = '模型加载失败，请刷新重试'; lel.classList.remove('hidden');
})();

window.addEventListener('keydown', (e) => {
  if (e.key==='r') { camera.position.set(40,30,50); controls.target.set(0,0,0); controls.update(); }
  if (e.key==='f' && models.length) fitCamera();
});
setTimeout(() => { document.getElementById('hint').style.opacity='0'; }, 8000);
function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
animate();
window.addEventListener('resize', () => { camera.aspect = container.clientWidth/container.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(container.clientWidth, container.clientHeight); });
</script>
</body>
</html>
